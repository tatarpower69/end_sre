worker_processes 1;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # Reverse Proxy for Microservices
        location /api/auth/ {
            proxy_pass http://auth-service:8000/;
        }

        location /api/user/ {
            proxy_pass http://user-service:8000/;
        }

        location /api/product/ {
            proxy_pass http://product-service:8000/;
        }

        location /api/order/ {
            proxy_pass http://order-service:8000/;
        }

        location /api/chat/ {
            proxy_pass http://chat-service:8000/;
        }

        location /api/payment/ {
            proxy_pass http://payment-service:8000/;
        }

        location /api/notification/ {
            proxy_pass http://notification-service:8000/;
        }

        location /health {
            access_log off;
            return 200 'healthy\n';
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
