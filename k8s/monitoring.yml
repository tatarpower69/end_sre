###############################################################################
# Prometheus Deployment
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sre-microservices
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - "/etc/prometheus/alert.rules.yml"
    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: "auth-service"
        static_configs:
          - targets: ["auth-service:8000"]
      - job_name: "user-service"
        static_configs:
          - targets: ["user-service:8000"]
      - job_name: "product-service"
        static_configs:
          - targets: ["product-service:8000"]
      - job_name: "order-service"
        static_configs:
          - targets: ["order-service:8000"]
      - job_name: "chat-service"
        static_configs:
          - targets: ["chat-service:8000"]
      - job_name: "payment-service"
        static_configs:
          - targets: ["payment-service:8000"]
      - job_name: "notification-service"
        static_configs:
          - targets: ["notification-service:8000"]
  alert.rules.yml: |
    groups:
      - name: microservices_alerts
        rules:
          - alert: HighCpuUsage
            expr: container_cpu_usage_seconds_total > 0.8
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage detected on {{ $labels.instance }}"
          - alert: ServiceDown
            expr: up == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.job }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sre-microservices
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-config
              mountPath: /etc/prometheus/alert.rules.yml
              subPath: alert.rules.yml
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sre-microservices
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: NodePort
---
###############################################################################
# Grafana Deployment
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sre-microservices
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: GRAFANA_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sre-microservices
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort
